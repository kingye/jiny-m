services:
  jiny-m:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ${JINY_CONFIG_DIR:-./.jiny}:/opt/jiny-m/.jiny
      - ${JINY_WORKSPACE_DIR:-./workspace}:/workspace
    environment:
      - OPENCODE_API_KEY
      - ANTHROPIC_API_KEY
      - GH_TOKEN
    restart: unless-stopped
