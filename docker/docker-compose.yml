services:
  jiny-m:
    image: jiny-m:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ${CHANNELS_DIR:-./}:/opt/jiny-m
      - ${OPENCODE_CONFIG:-./opencode.jsonc}:/root/.config/opencode/opencode.jsonc:ro
      - ${JINY_M_DIR}:/opt/jiny-m/jiny283a/workspace/jiny-M/jiny-m
      - ${NETWORKCALC_DIR}:/opt/jiny-m/jiny283a/workspace/networkcalc/c21-networkcalculation-srv
      - ${CHANNELS_DIR}/.netrc:/root/.netrc
      - ${CHANNELS_DIR}/gh_hosts.yml:/root/.config/gh/hosts.yml
    restart: unless-stopped
