services:
  jiny-m:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ${JINY_CONFIG_DIR:-./.jiny}:/opt/jiny-m/.jiny
      - ${JINY_WORKSPACE_DIR:-./workspace}:/workspace
      - ${OPENCODE_CONFIG:-./opencode.jsonc}:/root/.config/opencode/opencode.jsonc:ro
      - ${JINY_ENV_FILE:-./.env.jiny}:/opt/jiny-m/.env:ro
    environment:
      - GH_TOKEN
    restart: unless-stopped
