services:
  jiny-m:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ${JINY_DIR:-./jiny-data}:/opt/jiny-m
      - ${OPENCODE_CONFIG:-./opencode.jsonc}:/root/.config/opencode/opencode.jsonc:ro
    environment:
      - GH_TOKEN
      - GIT_USER_NAME
      - GIT_USER_EMAIL
    restart: unless-stopped
